<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="#221F22" />
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="120" height="400" rx="12" fill="#2D2A2E" />
  
  <!-- Sidebar Navigation Links -->
  <circle cx="30" cy="40" r="12" fill="#FF6188" />
  <rect x="52" y="34" width="50" height="12" rx="4" fill="#FCFCFA" opacity="0.8" />
  
  <rect x="15" y="80" width="90" height="24" rx="6" fill="#363337" />
  <circle cx="30" cy="92" r="6" fill="#78DCE8" />
  <rect x="45" y="88" width="50" height="8" rx="3" fill="#78DCE8" />
  
  <circle cx="30" cy="140" r="6" fill="#A9DC76" opacity="0.6" />
  <rect x="45" y="136" width="40" height="8" rx="3" fill="#FCFCFA" opacity="0.4" />
  
  <circle cx="30" cy="180" r="6" fill="#FFD866" opacity="0.6" />
  <rect x="45" y="176" width="55" height="8" rx="3" fill="#FCFCFA" opacity="0.4" />
  
  <circle cx="30" cy="220" r="6" fill="#AB9DF2" opacity="0.6" />
  <rect x="45" y="216" width="35" height="8" rx="3" fill="#FCFCFA" opacity="0.4" />
  
  <!-- Header / Top Bar -->
  <rect x="120" y="0" width="480" height="60" fill="#2D2A2E" />
  <text x="140" y="37" font-family="'Poppins', sans-serif" font-weight="600" font-size="18" fill="#FCFCFA">Dashboard</text>
  <rect x="420" y="15" width="120" height="30" rx="15" fill="#363337" />
  <circle cx="435" cy="30" r="8" fill="#A9DC76" />
  <rect x="452" y="26" width="70" height="8" rx="3" fill="#FCFCFA" opacity="0.6" />
  <circle cx="560" cy="30" r="12" fill="#AB9DF2" />
  
  <!-- Dashboard Grid -->
  <!-- Card 1: Sales (Line Chart) -->
  <rect x="140" y="80" width="280" height="180" rx="8" fill="#363337" />
  <text x="155" y="105" font-family="'Poppins', sans-serif" font-weight="600" font-size="12" fill="#C1C0C0">MONTHLY SALES</text>
  <text x="155" y="128" font-family="'Poppins', sans-serif" font-weight="700" font-size="18" fill="#FCFCFA">$45,231.89</text>
  
  <!-- Line Chart Drawing -->
  <path d="M 160 230 Q 200 170 230 190 T 300 140 T 370 170 T 400 110" fill="none" stroke="#FF6188" stroke-width="4" stroke-linecap="round" />
  <path d="M 160 230 Q 200 170 230 190 T 300 140 T 370 170 T 400 110 L 400 240 L 160 240 Z" fill="url(#salesGrad)" opacity="0.15" />
  
  <linearGradient id="salesGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF6188" />
    <stop offset="100%" stop-color="#FF6188" stop-opacity="0" />
  </linearGradient>
  
  <circle cx="400" cy="110" r="5" fill="#FF6188" stroke="#363337" stroke-width="2" />
  
  <!-- Card 2: Conversion (Radial) -->
  <rect x="440" y="80" width="140" height="180" rx="8" fill="#363337" />
  <text x="455" y="105" font-family="'Poppins', sans-serif" font-weight="600" font-size="12" fill="#C1C0C0">CONVERSION</text>
  <circle cx="510" cy="170" r="45" fill="none" stroke="#221F22" stroke-width="10" />
  <circle cx="510" cy="170" r="45" fill="none" stroke="#78DCE8" stroke-width="10" stroke-dasharray="283" stroke-dashoffset="70" stroke-linecap="round" transform="rotate(-90 510 170)" />
  <text x="510" y="176" font-family="'Poppins', sans-serif" font-weight="700" font-size="16" fill="#FCFCFA" text-anchor="middle">75%</text>
  
  <!-- Card 3: Traffic Bar Chart -->
  <rect x="140" y="280" width="440" height="100" rx="8" fill="#363337" />
  <text x="155" y="305" font-family="'Poppins', sans-serif" font-weight="600" font-size="12" fill="#C1C0C0">TRAFFIC SOURCES</text>
  
  <!-- Bar elements -->
  <rect x="155" y="335" width="20" height="30" rx="3" fill="#A9DC76" />
  <rect x="195" y="325" width="20" height="40" rx="3" fill="#FFD866" />
  <rect x="235" y="315" width="20" height="50" rx="3" fill="#78DCE8" />
  <rect x="275" y="340" width="20" height="25" rx="3" fill="#AB9DF2" />
  <rect x="315" y="320" width="20" height="45" rx="3" fill="#FC9867" />
  <rect x="355" y="330" width="20" height="35" rx="3" fill="#FF6188" />
  <rect x="395" y="310" width="20" height="55" rx="3" fill="#A9DC76" />
  <rect x="435" y="325" width="20" height="40" rx="3" fill="#78DCE8" />
  <rect x="475" y="335" width="20" height="30" rx="3" fill="#FFD866" />
  <rect x="515" y="315" width="20" height="50" rx="3" fill="#AB9DF2" />
  <rect x="555" y="320" width="20" height="45" rx="3" fill="#FF6188" />
</svg>

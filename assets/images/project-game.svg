<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background Space/Darkness -->
  <rect width="600" height="400" rx="12" fill="#221F22" />
  
  <!-- Starfield background dots -->
  <circle cx="50" cy="80" r="1.5" fill="#FCFCFA" opacity="0.3" />
  <circle cx="120" cy="140" r="1" fill="#FCFCFA" opacity="0.2" />
  <circle cx="210" cy="60" r="2" fill="#78DCE8" opacity="0.4" />
  <circle cx="340" cy="110" r="1" fill="#FCFCFA" opacity="0.1" />
  <circle cx="420" cy="50" r="1.5" fill="#FFD866" opacity="0.3" />
  <circle cx="520" cy="150" r="2.5" fill="#FCFCFA" opacity="0.4" />
  <circle cx="80" cy="280" r="1" fill="#FCFCFA" opacity="0.2" />
  <circle cx="480" cy="290" r="1.5" fill="#78DCE8" opacity="0.3" />
  
  <!-- Distant Nebulae (Gradients) -->
  <circle cx="450" cy="150" r="120" fill="url(#nebulaGrad)" opacity="0.12" />
  <defs>
    <radialGradient id="nebulaGrad">
      <stop offset="0%" stop-color="#AB9DF2" />
      <stop offset="100%" stop-color="#221F22" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Ground & Platforms -->
  <!-- Main Ground -->
  <rect x="0" y="340" width="600" height="60" fill="#2D2A2E" />
  <rect x="0" y="340" width="600" height="6" fill="#A9DC76" /> <!-- Glowing green top -->
  
  <!-- Floating Platform 1 -->
  <rect x="150" y="240" width="160" height="20" rx="4" fill="#2D2A2E" stroke="#AB9DF2" stroke-width="2" />
  <!-- Floating Platform 2 -->
  <rect x="380" y="160" width="140" height="20" rx="4" fill="#2D2A2E" stroke="#AB9DF2" stroke-width="2" />
  
  <!-- Obstacles / Hazards (Spikes) -->
  <polygon points="280,340 290,320 300,340" fill="#FF6188" />
  <polygon points="300,340 310,320 320,340" fill="#FF6188" />
  <polygon points="410,160 420,145 430,160" fill="#FF6188" />

  <!-- Collectibles (Glowing Yellow Stars/Coins) -->
  <!-- Coin 1 -->
  <circle cx="230" cy="200" r="8" fill="#FFD866" />
  <circle cx="230" cy="200" r="5" fill="none" stroke="#221F22" stroke-width="1.5" />
  
  <!-- Coin 2 -->
  <circle cx="430" cy="110" r="8" fill="#FFD866" />
  <circle cx="430" cy="110" r="5" fill="none" stroke="#221F22" stroke-width="1.5" />
  
  <!-- Coin 3 -->
  <circle cx="470" cy="110" r="8" fill="#FFD866" />
  <circle cx="470" cy="110" r="5" fill="none" stroke="#221F22" stroke-width="1.5" />

  <!-- Player Character (Sleek spaceship or platformer hero) -->
  <g transform="translate(180, 205)">
    <!-- Character body -->
    <rect x="0" y="0" width="24" height="24" rx="6" fill="#78DCE8" stroke="#FCFCFA" stroke-width="1.5" />
    <!-- Glowing visor -->
    <rect x="12" y="6" width="10" height="6" rx="2" fill="#FF6188" />
    <!-- Little backpack/jetpack -->
    <rect x="-6" y="4" width="6" height="14" rx="2" fill="#FC9867" />
    <!-- Jetpack flame -->
    <polygon points="-6,18 -9,24 -3,24" fill="#FFD866" />
  </g>

  <!-- UI Headers / Hud -->
  <rect x="0" y="0" width="600" height="50" fill="#2D2A2E" opacity="0.8" />
  <text x="20" y="32" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="16" fill="#A9DC76">SCORE: 01,420</text>
  <text x="580" y="32" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="16" fill="#FF6188" text-anchor="end">LIVES: ♥ ♥ ♥</text>
</svg>
